name: Build Windows (Tauri v2 + Vue + Bun)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          bun -v
          rustc -V
          cargo -V

      - name: Install deps (Bun)
        run: bun install

      - name: Build frontend (Vite)
        run: bun run build

      - name: Build Tauri
        run: bunx tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: src-tauri/target/release/bundle/